<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Key Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #ffffff;
  --surface:   #f5f5f5;
  --card:      #f9f9f9;
  --card2:     #f2f2f2;
  --border:    #e0e0e0;
  --border2:   #cccccc;
  --ink:       #111111;
  --ink2:      #555555;
  --ink3:      #999999;
  --black:     #000000;

  --c-chord:   #0070c0;
  --c-chord-bg:rgba(0,112,192,0.07);
  --c-chord-bd:rgba(0,112,192,0.25);
  --c-ext:     #b45309;
  --c-ext-bg:  rgba(180,83,9,0.07);
  --c-ext-bd:  rgba(180,83,9,0.25);
  --c-root-bg: rgba(0,0,0,0.04);
  --c-root-bd: rgba(0,0,0,0.20);
  --c-flag:    #6d28d9;
  --c-flag-bg: rgba(109,40,217,0.06);
  --c-flag-bd: rgba(109,40,217,0.20);
  --c-mode:    #065f46;
  --c-mode-bg: rgba(6,95,70,0.07);
  --c-mode-bd: rgba(6,95,70,0.22);
  --c-pass:    #9f1239;
  --c-pass-bg: rgba(159,18,57,0.06);
  --c-pass-bd: rgba(159,18,57,0.20);

  --nav-h: 60px;
  --sans: 'Plus Jakarta Sans','Segoe UI',system-ui,sans-serif;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}

.screen{display:none;flex-direction:column;height:100dvh;overflow:hidden;}
.screen.active{display:flex;}

.scroll-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + 16px);}
.scroll-body::-webkit-scrollbar{width:3px;}
.scroll-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(255,255,255,0.96);border-top:1px solid var(--border);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--ink3);font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 32px;-webkit-tap-highlight-color:transparent;transition:color .15s;}
.nav-btn:active{color:var(--black);}
.icon-home{width:22px;height:20px;position:relative;display:flex;flex-direction:column;align-items:center;}
.icon-home::before{content:'';width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-bottom:9px solid currentColor;}
.icon-home::after{content:'';width:14px;height:9px;background:currentColor;clip-path:polygon(0 0,100% 0,100% 100%,62% 100%,62% 45%,38% 45%,38% 100%,0 100%);}

/* HOME */
.home-header{padding:48px 20px 24px;border-bottom:2px solid var(--black);}
.home-kicker{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;}
.home-title{font-size:40px;font-weight:800;color:var(--black);line-height:1;letter-spacing:-.02em;}
.home-sub{font-size:12px;font-weight:500;color:var(--ink3);margin-top:8px;letter-spacing:.03em;}
.cof-wrap{padding:20px 14px 8px;}
.grid-label{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:12px;padding:0 2px;}
.key-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.key-card{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:14px 14px 12px;overflow:hidden;}
.kc-major-btn,.kc-minor-btn{display:block;width:100%;text-align:left;background:none;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;padding:0;}
.kc-major{font-size:18px;font-weight:800;color:var(--black);line-height:1.2;transition:color .1s;}
.kc-major-btn:active .kc-major{color:var(--c-chord);}
.kc-sig{font-size:10px;font-weight:500;color:var(--ink3);margin-top:2px;}
.kc-div{border:none;border-top:1px solid var(--border);margin:10px 0 9px;}
.kc-minor{font-size:13px;font-weight:600;color:var(--ink2);transition:color .1s;}
.kc-minor-btn:active .kc-minor{color:var(--c-chord);}

/* KEY VIEW HEADER */
.kv-header{padding:32px 20px 18px;border-bottom:2px solid var(--black);}
.kv-kicker{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.kv-name{font-size:36px;font-weight:800;color:var(--black);line-height:1;letter-spacing:-.02em;}

/* SCALE SECTION */
.scale-wrap{padding:16px 12px 0;border-bottom:1px solid var(--border);}
.sec-label{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:11px;padding:0 2px;}

/* fingering toggle */
.fing-toggle-row{display:flex;gap:5px;margin-bottom:10px;}
.fing-tog{font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.06em;padding:4px 11px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface);color:var(--ink3);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .1s;}
.fing-tog.active{background:var(--black);border-color:var(--black);color:#fff;}

.scale-row{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 2px 14px;scrollbar-width:none;}
.scale-row::-webkit-scrollbar{display:none;}

.scale-note{flex:1;min-width:44px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 3px 8px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .12s,border-color .12s;}
.scale-note.sel{background:var(--c-root-bg);border-color:var(--c-root-bd);}
.scale-note.hl-chord{background:var(--c-chord-bg);border-color:var(--c-chord-bd);}
.scale-note.hl-ext{background:var(--c-ext-bg);border-color:var(--c-ext-bd);}

.sn-note{font-size:15px;font-weight:800;color:var(--ink);line-height:1;white-space:nowrap;}
.scale-note.sel .sn-note{color:var(--black);}
.scale-note.hl-chord .sn-note{color:var(--c-chord);}
.scale-note.hl-ext .sn-note{color:var(--c-ext);}

.sn-7th{font-size:10px;font-weight:700;color:var(--ink3);line-height:1;white-space:nowrap;}
.scale-note.hl-chord .sn-7th{color:var(--c-chord);opacity:.7;}
.scale-note.hl-ext .sn-7th{color:var(--c-ext);opacity:.7;}

.sn-fing{font-size:11px;font-weight:600;color:var(--ink3);line-height:1;}
.scale-note.sel .sn-fing{color:var(--ink2);}

.sn-deg{font-size:10px;font-weight:700;color:var(--ink3);line-height:1;}
.scale-note.hl-chord .sn-deg{color:var(--c-chord);opacity:.7;}
.scale-note.hl-ext .sn-deg{color:var(--c-ext);opacity:.7;}

.sn-func{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink3);line-height:1;opacity:.7;}

/* legend */
.legend{display:none;gap:14px;padding:6px 14px 12px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.leg-dot.root{background:var(--black);}
.leg-dot.chord{background:var(--c-chord);}
.leg-dot.ext{background:var(--c-ext);}

/* CHORD PANEL */
.chord-panel{margin:0 12px;border:1.5px solid var(--border2);border-top:none;border-radius:0 0 10px 10px;background:var(--bg);display:none;overflow:hidden;}
.chord-panel.open{display:block;}
.cp-body{padding:16px;}
.cp-row1{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:14px;}
.cp-name{font-size:30px;font-weight:800;color:var(--black);line-height:1;letter-spacing:-.02em;}
.cp-qual{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);}

.cp-toggles{display:flex;gap:5px;margin-bottom:14px;}
.cp-tog{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.06em;padding:6px 14px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface);color:var(--ink2);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .1s;}
.cp-tog.on-triad{background:var(--c-root-bg);border-color:var(--c-root-bd);color:var(--black);}
.cp-tog.on-seventh{background:var(--c-ext-bg);border-color:var(--c-ext-bd);color:var(--c-ext);}
.cp-tog.on-ninth{background:var(--c-ext-bg);border-color:var(--c-ext-bd);color:var(--c-ext);}

.cp-tones{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;align-items:center;}
.chip{font-size:16px;font-weight:800;padding:5px 11px;border-radius:7px;line-height:1.2;}
.chip.triad{background:var(--c-chord-bg);color:var(--c-chord);border:1.5px solid var(--c-chord-bd);}
.chip.ext{background:var(--c-ext-bg);color:var(--c-ext);border:1.5px solid var(--c-ext-bd);}
.chip-plus{font-size:13px;font-weight:700;color:var(--ink3);padding:0 2px;}

/* keys that use this chord */
.cp-keys-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;align-items:center;}
.cp-keys-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-right:4px;flex-shrink:0;}
.cp-key-pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface);color:var(--ink2);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color .1s,color .1s;}
.cp-key-pill:active{border-color:var(--c-chord);color:var(--c-chord);}

.cp-hr{border:none;border-top:1px solid var(--border);margin:12px 0;}
.cp-sublabel{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:9px;}

.cp-invs{display:flex;flex-direction:column;gap:7px;}
.cp-inv{display:flex;align-items:baseline;}
.inv-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);min-width:88px;flex-shrink:0;}
.inv-notes{font-size:15px;font-weight:600;color:var(--ink2);letter-spacing:.02em;}

/* mode flag */
.mode-flag{margin-top:12px;padding:10px 12px;border-left:3px solid var(--c-mode-bd);background:var(--c-mode-bg);border-radius:0 8px 8px 0;}
.mode-flag-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--c-mode);opacity:.8;margin-bottom:3px;}
.mode-flag-text{font-size:14px;font-weight:700;color:var(--c-mode);line-height:1.5;}
.mode-flag-desc{font-size:11px;font-weight:500;color:var(--c-mode);opacity:.75;margin-top:2px;line-height:1.4;}

/* harmonic flag */
.harm-flag{margin-top:10px;padding:10px 12px;border-left:3px solid var(--c-flag-bd);background:var(--c-flag-bg);border-radius:0 8px 8px 0;}
.harm-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--c-flag);opacity:.8;margin-bottom:4px;}
.harm-text{font-size:14px;font-weight:600;color:var(--c-flag);line-height:1.5;}

/* VOICINGS */
.voicing-wrap{background:var(--card2);border-top:1px solid var(--border);padding:14px 16px 16px;}
.vc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.vc-title{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);}
.vc-badge{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);border:1.5px solid var(--border2);border-radius:4px;padding:2px 7px;}
.vc-list{display:flex;flex-direction:column;gap:8px;}
.vc-card{background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:11px 13px 11px 16px;position:relative;overflow:hidden;}
.vc-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c-chord);border-radius:9px 0 0 9px;}
.vc-card.yours::before{background:var(--c-ext);}
.vc-name{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:8px;letter-spacing:-.01em;display:flex;align-items:center;gap:7px;}
.vc-tag{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--c-ext);background:var(--c-ext-bg);border:1px solid var(--c-ext-bd);border-radius:4px;padding:2px 6px;}
.vc-hands{display:flex;flex-direction:column;gap:5px;}
.vc-hand{display:flex;align-items:baseline;gap:10px;}
.vc-hand-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);min-width:20px;flex-shrink:0;}
.vc-hand-notes{font-size:16px;font-weight:700;color:var(--ink2);letter-spacing:.04em;line-height:1.2;}
.vc-tip{font-size:10px;font-weight:500;color:var(--ink3);margin-top:7px;line-height:1.55;}

/* ARPEGGIO SECTION */
.arp-wrap{background:var(--surface);border-top:1px solid var(--border);padding:14px 16px 16px;}
.arp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.arp-title{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);}
.arp-list{display:flex;flex-direction:column;gap:7px;}
.arp-card{background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:11px 13px 11px 16px;position:relative;overflow:hidden;}
.arp-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c-mode);border-radius:9px 0 0 9px;}
.arp-name{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:5px;letter-spacing:-.01em;}
.arp-seq{font-size:15px;font-weight:700;color:var(--ink2);letter-spacing:.04em;line-height:1.3;margin-bottom:4px;}
.arp-tip{font-size:10px;font-weight:500;color:var(--ink3);line-height:1.55;}

/* PROGRESSIONS */
.prog-wrap{padding:18px 16px 0;border-bottom:1px solid var(--border);}
.prog-list{display:flex;flex-direction:column;margin-bottom:18px;}
.prog-row{display:flex;flex-direction:column;gap:0;padding:11px 0;border-bottom:1px solid var(--border);}
.prog-row:last-child{border-bottom:none;}
.prog-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:3px;}
.prog-roman{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);}
.prog-feel{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:4px;border:1.5px solid var(--border);background:var(--surface);color:var(--ink3);}
.prog-chords{font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-.01em;line-height:1.3;margin-bottom:6px;}

/* passing notes */
.passing-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.pass-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--c-pass);opacity:.8;flex-shrink:0;}
.pass-item{font-size:11px;font-weight:700;color:var(--c-pass);background:var(--c-pass-bg);border:1px solid var(--c-pass-bd);border-radius:4px;padding:2px 7px;}
.pass-note-sub{font-size:10px;font-weight:500;color:var(--c-pass);opacity:.7;margin-left:2px;}

/* RELATED */
.related-wrap{padding:18px 16px 0;}
.related-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.rel-card{border:1.5px solid var(--border);border-radius:9px;padding:12px 28px 12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;background:var(--bg);transition:border-color .12s,background .12s;position:relative;overflow:hidden;}
.rel-card::after{content:'›';position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:18px;font-weight:700;color:var(--ink3);}
.rel-card:active{background:var(--surface);border-color:var(--border2);}
.rel-relation{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:3px;}
.rel-name{font-size:16px;font-weight:700;color:var(--black);letter-spacing:-.01em;}
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="scroll-body">
    <div class="home-header">
      <div class="home-kicker">Piano Reference</div>
      <div class="home-title">Key Hub</div>
      <div class="home-sub">24 keys · Circle of Fifths · Tap to enter</div>
    </div>
    <div class="cof-wrap">
      <div class="grid-label">Major / Relative minor</div>
      <div class="key-grid" id="key-grid"></div>
    </div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-btn" onclick="goHome()"><div class="icon-home"></div>Home</button>
  </nav>
</div>

<!-- KEY VIEW -->
<div id="screen-key" class="screen">
  <div class="scroll-body" id="key-scroll">
    <div class="kv-header">
      <div class="kv-kicker" id="kv-kicker"></div>
      <div class="kv-name"   id="kv-name"></div>
    </div>

    <div class="scale-wrap">
      <div class="sec-label">Scale · Degrees · Chords</div>
      <div class="fing-toggle-row">
        <button class="fing-tog active" data-hand="rh" onclick="setHand('rh')">RH fingering</button>
        <button class="fing-tog"        data-hand="lh" onclick="setHand('lh')">LH fingering</button>
      </div>
      <div class="scale-row" id="scale-row"></div>
      <div class="legend" id="legend">
        <div class="legend-item"><div class="leg-dot root"></div>Root</div>
        <div class="legend-item"><div class="leg-dot chord"></div>Chord tone</div>
        <div class="legend-item"><div class="leg-dot ext"></div>Extension</div>
      </div>
    </div>

    <div class="chord-panel" id="chord-panel"></div>

    <div class="prog-wrap">
      <div class="sec-label">Common Progressions</div>
      <div class="prog-list" id="prog-list"></div>
    </div>

    <div class="related-wrap">
      <div class="sec-label">Related Keys</div>
      <div class="related-grid" id="related-grid"></div>
    </div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-btn" onclick="goHome()"><div class="icon-home"></div>Home</button>
  </nav>
</div>

<script>
// ══════════════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════════════

const COF_PAIRS = [
  {major:'C', minor:'A', sig:'0 acc.'},
  {major:'G', minor:'E', sig:'1♯'},
  {major:'D', minor:'B', sig:'2♯'},
  {major:'A', minor:'F#', sig:'3♯'},
  {major:'E', minor:'C#', sig:'4♯'},
  {major:'B', minor:'G#', sig:'5♯'},
  {major:'F#', minor:'D#', sig:'6♯'},
  {major:'Db', minor:'Bb', sig:'5♭'},
  {major:'Ab', minor:'F', sig:'4♭'},
  {major:'Eb', minor:'C', sig:'3♭'},
  {major:'Bb', minor:'G', sig:'2♭'},
  {major:'F', minor:'D', sig:'1♭'},
];

// Chord function labels: T=Tonic, SD=Subdominant, D=Dominant, TD=Tonic/Dominant
const FUNC_MAJOR = ['Tonic','Subdominant','Tonic','Subdominant','Dominant','Tonic','Dominant'];
const FUNC_MINOR = ['Tonic','Subdominant','Tonic','Subdominant','Dominant','Subdominant','Subtonic'];

// Mode names per scale degree (major scale)
const MODES_MAJOR = ['Ionian','Dorian','Phrygian','Lydian','Mixolydian','Aeolian','Locrian'];
const MODES_MINOR = ['Aeolian','Locrian','Ionian','Dorian','Phrygian','Lydian','Mixolydian'];

// Brief mode character descriptions
const MODE_DESC = {
  'Ionian':     'Major scale. Bright, resolved.',
  'Dorian':     'Minor with raised 6th. Jazz-friendly, bittersweet.',
  'Phrygian':   'Minor with flattened 2nd. Dark, Spanish character.',
  'Lydian':     'Major with raised 4th. Dreamy, floating.',
  'Mixolydian': 'Major with flattened 7th. Bluesy, driving.',
  'Aeolian':    'Natural minor. Dark, introspective.',
  'Locrian':    'Diminished feel. Unstable, tense.',
};

const KEYS = {

const COF_MAJ = ['C','G','D','A','E','B','F#','Db','Ab','Eb','Bb','F'];
const COF_MIN = ['A','E','B','F#','C#','G#','D#','Bb','F','C','G','D'];

// ── all key IDs for reverse lookup ──
const ALL_KEY_IDS = Object.keys(KEYS);

// ══════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════

function getTones(kid, deg, ext) {
  const n = KEYS[kid].notes;
  const all = [n[deg], n[(deg+2)%7], n[(deg+4)%7], n[(deg+6)%7], n[(deg+1)%7]];
  return all.slice(0, ext===0?3 : ext===1?4 : 5);
}

function qlabel(q) { return {M:'Major',m:'Minor',d:'Diminished'}[q]||q; }

function csym(root, q, ext) {
  return root + (q==='M'?'':q==='m'?'m':'°') + (ext===1?'7':ext===2?'9':'');
}

// Diatonic 7th symbol for a scale degree (always with 7th)
function diat7sym(kid, deg) {
  const key = KEYS[kid];
  return csym(key.notes[deg], key.quals[deg], 1);
}

// ── Reverse lookup: which keys contain root note as a chord ──
function reverseKeyLookup(rootNote, qual) {
  // Match enharmonic equivalents simply by note name
  const results = [];
  ALL_KEY_IDS.forEach(kid => {
    const key = KEYS[kid];
    key.notes.forEach((n, i) => {
      if (n === rootNote && key.quals[i] === qual) {
        results.push({kid, roman: key.romans[i]});
      }
    });
  });
  return results;
}

// ══════════════════════════════════════════════════════
//  VOICING ENGINE
// ══════════════════════════════════════════════════════

function getVoicings(ts, q) {
  const [r,t3,t5,t7,t9] = ts;
  const ext = ts.length;
  const vs = [];
  if (ext===3) {
    vs.push({name:'Close position',      lh:r,             rh:`${r}  ${t3}  ${t5}`,       tip:'Root in LH, full triad in RH. Direct and centred.'});
    vs.push({name:'Open / spread',        lh:`${r}  ${t5}`, rh:`${t3}  ${r}`,              tip:'Root and 5th wide in LH. 3rd defines the quality in RH.'});
    vs.push({name:'1st inversion spread', lh:`${r}  ${t3}`, rh:`${t5}  ${r}`,              tip:'Softer than root position. Works well as an inner chord.'});
    vs.push({name:'Root + upper pair',    lh:r,             rh:`${t3}  ${t5}`,             tip:'Root alone anchors LH; 3rd and 5th float in RH. Minimal and open.', yours:true});
  }
  if (ext===4) {
    vs.push({name:'Close position',       lh:r,             rh:`${t3}  ${t5}  ${t7}`,      tip:'All four tones in RH. Full and dense.'});
    vs.push({name:'Shell voicing',        lh:`${r}  ${t7}`, rh:`${t3}  ${t5}`,             tip:'The jazz standard. Root + 7th frame in LH; 3rd and 5th colour in RH.'});
    vs.push({name:'Drop-2',              lh:`${r}  ${t5}`, rh:`${t7}  ${t3}`,              tip:'Second voice from top dropped an octave. Opens up the sound.'});
    vs.push({name:'Root + upper cluster', lh:r,             rh:`${t7}  ${t3}  ${t5}`,      tip:'Root alone in LH. 7th at the base of the RH cluster defines the colour immediately above it.', yours:true});
  }
  if (ext===5) {
    vs.push({name:'Shell + 9th',          lh:`${r}  ${t7}`, rh:`${t3}  ${t9}`,             tip:'Drop the 5th. Root + 7th in LH; 3rd + 9th in RH. The Bill Evans approach.'});
    vs.push({name:'Spread voicing',       lh:`${r}  ${t7}`, rh:`${t9}  ${t3}  ${t5}`,      tip:'9th on top gives a luminous, open quality. Strong in ballad contexts.'});
    vs.push({name:'Quartal hint',         lh:`${r}  ${t7}`, rh:`${t9}  ${t5}  ${t3}`,      tip:'Stack RH from 9th down. Modern and ambiguous.'});
    vs.push({name:'Root + upper structure',lh:r,            rh:`${t7}  ${t9}  ${t3}  ${t5}`,tip:'Root alone anchors LH. RH stacks 7th → 9th → 3rd → 5th in close position. Grounded yet open — all the colour in the RH cluster.', yours:true});
  }
  return vs;
}

// ══════════════════════════════════════════════════════
//  ARPEGGIO PATTERNS
// ══════════════════════════════════════════════════════

function getArpeggios(ts, q) {
  const [r,t3,t5,t7,t9] = ts;
  const ext = ts.length;
  const arps = [];

  if (ext===3) {
    arps.push({name:'Ascending',         seq:`${r} – ${t3} – ${t5} – ${r}`,         tip:'Classic ascending broken chord. Move to octave on final root.'});
    arps.push({name:'Descending',        seq:`${r} – ${t5} – ${t3} – ${r}`,         tip:'Reverse. Use to close phrases or approach the next chord from above.'});
    arps.push({name:'Root–5th–3rd',      seq:`${r} – ${t5} – ${t3} – ${t5}`,        tip:'Skip the 3rd on the way up. More angular, less predictable.'});
    arps.push({name:'Alberti-style',     seq:`${r} – ${t5} – ${t3} – ${t5}  (repeating)`, tip:'Classic LH accompaniment pattern. Keeps motion under sustained RH melody.'});
  }
  if (ext===4) {
    arps.push({name:'Ascending',         seq:`${r} – ${t3} – ${t5} – ${t7} – ${r}`, tip:'Full 4-note arpeggio. Works as a fill or run into the next bar.'});
    arps.push({name:'Jazz waltz figure', seq:`${r} – ${t5} – ${t7} – ${t3} – ${t5}`,tip:'Root jumps to 5th, then walks up through 7th to 3rd. Very idiomatic.'});
    arps.push({name:'Root–7th–3rd–5th',  seq:`${r} – ${t7} – ${t3} – ${t5}`,        tip:'Shell tones first, then fill. Strong sense of the chord quality immediately.'});
    arps.push({name:'Descending from 7th',seq:`${t7} – ${t5} – ${t3} – ${r}`,       tip:'Descend from the colour tone. Good for leading into the next chord root below.'});
  }
  if (ext===5) {
    arps.push({name:'Ascending 9th run',  seq:`${r} – ${t3} – ${t5} – ${t7} – ${t9}`, tip:'Full 5-note ascending run. Natural phrase-ending figure.'});
    arps.push({name:'7th–9th–3rd figure', seq:`${t7} – ${t9} – ${t3} – ${t5} – ${r}`, tip:'Start on the 7th, rise through the 9th to the 3rd. Jazzy and idiomatic — the 9th lands as a melodic peak.'});
    arps.push({name:'Root–5th–9th–3rd',   seq:`${r} – ${t5} – ${t9} – ${t3} – ${t7}`, tip:'Skips outline the open shell then fill with colour tones. Lots of space.'});
    arps.push({name:'Bebop-style descent', seq:`${t9} – ${t7} – ${t5} – ${t3} – ${r}`,tip:'Descend from the 9th all the way to root. Use as a run into the next chord.'});
  }
  return arps;
}

// ══════════════════════════════════════════════════════
//  PASSING NOTES ENGINE
//  For each adjacent chord pair in a progression,
//  find the chromatic or diatonic note between root A and root B
// ══════════════════════════════════════════════════════

// Chromatic semitone map (enharmonic simplified)
const CHROM = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ENHAR = {'Db':'C#','Eb':'D#','Fb':'E','Gb':'F#','Ab':'G#','Bb':'A#','Cb':'B',
               'E#':'F','B#':'C'};

function noteToIdx(n) {
  const norm = ENHAR[n] || n;
  return CHROM.indexOf(norm);
}

function getPassingNotes(fromNote, toNote, keyNotes) {
  const fi = noteToIdx(fromNote);
  const ti = noteToIdx(toNote);
  if (fi === -1 || ti === -1 || fi === ti) return [];

  // Semitone distance both directions
  const up   = (ti - fi + 12) % 12;
  const down = (fi - ti + 12) % 12;

  const results = [];

  if (up === 1 || down === 1) {
    // Semitone apart — chromatic passing note midway
    return []; // too close, no passing needed
  }

  if (up <= 4) {
    // Ascending — find chromatic note(s) between
    for (let s = 1; s < up; s++) {
      const idx = (fi + s) % 12;
      const cn = CHROM[idx];
      const isDiatonic = keyNotes.some(n => (ENHAR[n]||n) === cn);
      results.push({note: cn, type: isDiatonic ? 'diatonic' : 'chromatic', dir:'↑'});
    }
  } else if (down <= 4) {
    // Descending
    for (let s = 1; s < down; s++) {
      const idx = (fi - s + 12) % 12;
      const cn = CHROM[idx];
      const isDiatonic = keyNotes.some(n => (ENHAR[n]||n) === cn);
      results.push({note: cn, type: isDiatonic ? 'diatonic' : 'chromatic', dir:'↓'});
    }
  } else {
    // Larger leap — show approach note (semitone below destination)
    const approach = CHROM[(ti - 1 + 12) % 12];
    const isDiatonic = keyNotes.some(n => (ENHAR[n]||n) === approach);
    results.push({note: approach, type: isDiatonic ? 'diatonic' : 'chromatic', dir:'→', label:'approach'});
  }

  return results;
}

let curKey=null, selDeg=null, curExt=0, curHand='rh';

function goHome() {
  selDeg=null; curExt=0;
  document.getElementById('screen-key').classList.remove('active');
  document.getElementById('screen-home').classList.add('active');
}

function enterKey(kid) {
  curKey=kid; selDeg=null; curExt=0;
  renderKeyView(kid);
  document.getElementById('screen-home').classList.remove('active');
  document.getElementById('screen-key').classList.add('active');
  document.getElementById('key-scroll').scrollTop=0;
}

function setHand(hand) {
  curHand = hand;
  document.querySelectorAll('.fing-tog').forEach(b => b.classList.toggle('active', b.dataset.hand === hand));
  if (curKey) renderScale(curKey);
}

function renderHome() {
  const g = document.getElementById('key-grid');
  g.innerHTML = '';
  COF_PAIRS.forEach(p => {
    const mjId = p.major+'_major', mnId = p.minor.replace('/','')+'_minor';
    const c = document.createElement('div'); c.className='key-card';
    c.innerHTML = `
      <button class="kc-major-btn" data-k="${mjId}"><div class="kc-major">${p.major} Major</div><div class="kc-sig">${p.sig}</div></button>
      <hr class="kc-div">
      <button class="kc-minor-btn" data-k="${mnId}"><div class="kc-minor">${p.minor} minor</div></button>`;
    c.querySelector('.kc-major-btn').onclick = e => { const k=e.currentTarget.dataset.k; if(KEYS[k]) enterKey(k); };
    c.querySelector('.kc-minor-btn').onclick = e => { const k=e.currentTarget.dataset.k; if(KEYS[k]) enterKey(k); };
    g.appendChild(c);
  });
}

// ══════════════════════════════════════════════════════

function renderKeyView(kid) {
  const key = KEYS[kid];
  document.getElementById('kv-name').textContent = key.name;
  document.getElementById('kv-kicker').textContent = key.type==='major' ? 'Major Key' : 'Natural Minor Key';
  renderScale(kid);
  closePanel();
  document.getElementById('legend').style.display = 'none';
  renderProgressions(kid);
  renderRelated(kid);
}

function renderScale(kid) {
  const key = KEYS[kid];
  const row = document.getElementById('scale-row');
  const funcs = key.type==='major' ? FUNC_MAJOR : FUNC_MINOR;
  const modes  = key.type==='major' ? MODES_MAJOR : MODES_MINOR;
  const fing   = curHand==='rh' ? key.rh : key.lh;
  row.innerHTML = '';
  key.notes.forEach((n, i) => {
    const d = document.createElement('div');
    d.className = 'scale-note';
    d.innerHTML = `
      <span class="sn-note">${n}</span>
      <span class="sn-7th">${diat7sym(kid,i)}</span>
      <span class="sn-fing">${fing[i]}</span>
      <span class="sn-deg">${key.romans[i]}</span>
      <span class="sn-func">${funcs[i].substring(0,3)}</span>`;
    d.onclick = () => onDeg(kid, i);
    row.appendChild(d);
  });
}

function onDeg(kid, deg) {
  if (selDeg===deg) { selDeg=null; curExt=0; clearHL(); closePanel(); document.getElementById('legend').style.display='none'; return; }
  selDeg=deg; curExt=0;
  applyHL(kid,deg,0); openPanel(kid,deg,0);
  document.getElementById('legend').style.display='flex';
}

function clearHL() { document.querySelectorAll('#scale-row .scale-note').forEach(n=>n.classList.remove('sel','hl-chord','hl-ext')); }

function applyHL(kid,deg,ext) {
  const ts=getTones(kid,deg,ext), notes=KEYS[kid].notes;
  const tri=ts.slice(0,3), exts=ts.slice(3);
  document.querySelectorAll('#scale-row .scale-note').forEach((n,i)=>{
    n.classList.remove('sel','hl-chord','hl-ext');
    if(i===deg) n.classList.add('sel');
    else if(tri.includes(notes[i])) n.classList.add('hl-chord');
    else if(exts.includes(notes[i])) n.classList.add('hl-ext');
  });
}

function closePanel() { const p=document.getElementById('chord-panel'); p.classList.remove('open'); p.innerHTML=''; }

function togClass(ext) { return ext===0?'on-triad':ext===1?'on-seventh':'on-ninth'; }

function openPanel(kid, deg, ext) {
  const key  = KEYS[kid];
  const q    = key.quals[deg];
  const ts   = getTones(kid,deg,ext);
  const sym  = csym(key.notes[deg],q,ext);
  const isVm = key.type==='minor' && deg===4;
  const funcs= key.type==='major' ? FUNC_MAJOR : FUNC_MINOR;
  const modes= key.type==='major' ? MODES_MAJOR : MODES_MINOR;
  const modeName = modes[deg];
  const modeDesc = MODE_DESC[modeName] || '';

  // tone chips
  const tri=ts.slice(0,3), extTs=ts.slice(3);
  let chips = tri.map(t=>`<span class="chip triad">${t}</span>`).join('');
  if(extTs.length) chips += `<span class="chip-plus">+</span>` + extTs.map(t=>`<span class="chip ext">${t}</span>`).join('');

  // reverse lookup
  const revKeys = reverseKeyLookup(key.notes[deg], q);
  const revPills = revKeys
    .filter(r => r.kid !== kid)
    .slice(0, 8)
    .map(r => {
      const kn = KEYS[r.kid].name;
      return `<button class="cp-key-pill" onclick="enterKey('${r.kid}')">${kn} <span style="opacity:.6;font-size:9px">${r.roman}</span></button>`;
    }).join('');

  // inversions
  const [r,t3,t5] = tri;
  const invs = [{l:'1st inv',n:`${t3}  ${t5}  ${r}`},{l:'2nd inv',n:`${t5}  ${r}  ${t3}`}]
    .map(v=>`<div class="cp-inv"><span class="inv-label">${v.l}</span><span class="inv-notes">${v.n}</span></div>`).join('');

  // mode flag
  const modeHTML = `
    <div class="mode-flag">
      <div class="mode-flag-label">Mode from this root</div>
      <div class="mode-flag-text">${key.notes[deg]} ${modeName}</div>
      <div class="mode-flag-desc">${modeDesc}</div>
    </div>`;

  // harmonic minor
  let hflag = '';
  if (isVm && key.vh) hflag = `
    <div class="harm-flag">
      <div class="harm-label">Harmonic minor option</div>
      <div class="harm-text">v → <strong>${key.vh.chord}</strong> · ${key.vh.notes}</div>
    </div>`;

  // voicings
  const vcs = getVoicings(ts,q).map(v=>`
    <div class="vc-card${v.yours?' yours':''}">
      <div class="vc-name">${v.name}${v.yours?'<span class="vc-tag">Your voicing</span>':''}</div>
      <div class="vc-hands">
        <div class="vc-hand"><span class="vc-hand-lbl">LH</span><span class="vc-hand-notes">${v.lh}</span></div>
        <div class="vc-hand"><span class="vc-hand-lbl">RH</span><span class="vc-hand-notes">${v.rh}</span></div>
      </div>
      <div class="vc-tip">${v.tip}</div>
    </div>`).join('');

  // arpeggios
  const arps = getArpeggios(ts,q).map(a=>`
    <div class="arp-card">
      <div class="arp-name">${a.name}</div>
      <div class="arp-seq">${a.seq}</div>
      <div class="arp-tip">${a.tip}</div>
    </div>`).join('');

  const panel = document.getElementById('chord-panel');
  panel.innerHTML = `
    <div class="cp-body">
      <div class="cp-row1">
        <div class="cp-name">${sym}</div>
        <div class="cp-qual">${qlabel(q)} · ${funcs[deg]}</div>
      </div>
      <div class="cp-toggles">
        <button class="cp-tog ${ext===0?togClass(0):''}" data-e="0">Triad</button>
        <button class="cp-tog ${ext===1?togClass(1):''}" data-e="1">7th</button>
        <button class="cp-tog ${ext===2?togClass(2):''}" data-e="2">9th</button>
      </div>
      <div class="cp-tones">${chips}</div>
      ${revPills ? `<div class="cp-keys-row"><span class="cp-keys-label">Also in</span>${revPills}</div>` : ''}
      <hr class="cp-hr">
      <div class="cp-sublabel">Inversions</div>
      <div class="cp-invs">${invs}</div>
      ${modeHTML}
      ${hflag}
    </div>
    <div class="voicing-wrap">
      <div class="vc-header"><div class="vc-title">Voicings</div><div class="vc-badge">LH · RH</div></div>
      <div class="vc-list">${vcs}</div>
    </div>
    <div class="arp-wrap">
      <div class="arp-header"><div class="arp-title">Arpeggio &amp; Broken Chord Patterns</div></div>
      <div class="arp-list">${arps}</div>
    </div>`;

  panel.querySelectorAll('.cp-tog').forEach(b=>{
    b.onclick = () => { const ne=+b.dataset.e; curExt=ne; applyHL(kid,selDeg,ne); openPanel(kid,selDeg,ne); };
  });
  panel.classList.add('open');
}

// ══════════════════════════════════════════════════════
//  RENDER: PROGRESSIONS (with feel tags + passing notes)
// ══════════════════════════════════════════════════════

function renderProgressions(kid) {
  const key=KEYS[kid], n=key.notes, q=key.quals;
  const cn = i => csym(n[i],q[i],0);
  const list = document.getElementById('prog-list');
  list.innerHTML = '';

  const progs = key.type==='major' ? [
    {r:'ii – V – I',        c:[1,4,0],       feel:'Jazz'},
    {r:'I – IV – V – I',    c:[0,3,4,0],     feel:'Classic'},
    {r:'I – V – vi – IV',   c:[0,4,5,3],     feel:'Pop'},
    {r:'iii – vi – ii – V', c:[2,5,1,4],     feel:'Jazz cycle'},
  ] : [
    {r:'ii° – V – i',       c:[1,4,0],       feel:'Jazz minor'},
    {r:'i – VII – VI – VII', c:[0,6,5,6],    feel:'Driving'},
    {r:'i – iv – v',        c:[0,3,4],       feel:'Modal'},
    {r:'i – VI – III – VII', c:[0,5,2,6],    feel:'Ballad'},
  ];

  progs.forEach(p => {
    const chordNames = p.c.map(i => cn(i));
    const chordRoots = p.c.map(i => n[i]);
    const row = document.createElement('div');
    row.className = 'prog-row';

    // passing notes between adjacent pairs
    let passingHTML = '';
    const passItems = [];
    for (let i=0; i < chordRoots.length-1; i++) {
      const pn = getPassingNotes(chordRoots[i], chordRoots[i+1], key.notes);
      pn.forEach(p => {
        const lbl = p.label ? ` <span class="pass-note-sub">${p.label}</span>` : '';
        passItems.push(`<span class="pass-item">${chordNames[i]} ${p.dir} ${chordNames[i+1]}: <strong>${p.note}</strong>${lbl} <span style="opacity:.6">${p.type}</span></span>`);
      });
    }
    if (passItems.length) {
      passingHTML = `<div class="passing-row"><span class="pass-label">Passing</span>${passItems.join('')}</div>`;
    }

    row.innerHTML = `
      <div class="prog-top">
        <span class="prog-roman">${p.r}</span>
        <span class="prog-feel">${p.feel}</span>
      </div>
      <div class="prog-chords">${chordNames.join('  –  ')}</div>
      ${passingHTML}`;
    list.appendChild(row);
  });
}

// ══════════════════════════════════════════════════════
//  RENDER: RELATED KEYS
// ══════════════════════════════════════════════════════

function getRelated(kid) {
  const key=KEYS[kid], name=key.name.split(' ')[0], out=[];
  if (key.type==='major') {
    const pi=COF_PAIRS.findIndex(p=>p.major===name);
    if(pi>=0) out.push({label:'Relative minor',id:COF_PAIRS[pi].minor+'_minor'});
    const mi=COF_MAJ.indexOf(name);
    if(mi>=0){out.push({label:'← Flatter',id:COF_MAJ[(mi+11)%12]+'_major'});out.push({label:'Sharper →',id:COF_MAJ[(mi+1)%12]+'_major'});}
  } else {
    const pi=COF_PAIRS.findIndex(p=>p.minor===name);
    if(pi>=0) out.push({label:'Relative major',id:COF_PAIRS[pi].major+'_major'});
    const mi=COF_MIN.indexOf(name);
    if(mi>=0){out.push({label:'← Flatter',id:COF_MIN[(mi+11)%12]+'_minor'});out.push({label:'Sharper →',id:COF_MIN[(mi+1)%12]+'_minor'});}
  }
  return out.filter(r=>KEYS[r.id]);
}

function renderRelated(kid) {
  const g=document.getElementById('related-grid'); g.innerHTML='';
  getRelated(kid).forEach(r=>{
    const k=KEYS[r.id], c=document.createElement('div'); c.className='rel-card';
    c.innerHTML=`<div class="rel-relation">${r.label}</div><div class="rel-name">${k.name}</div>`;
    c.onclick=()=>enterKey(r.id);
    g.appendChild(c);
  });
}

renderHome();
</script>
